version: "3.9"

services:

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-web
    restart: unless-stopped
    # Uncomment to test locally without ngrok:
    # ports:
    #   - "3000:80"

  ngrok:
    image: ngrok/ngrok:latest
    container_name: portfolio-ngrok
    restart: unless-stopped
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command: http web:80 --log=stdout
    ports:
      - "4040:4040"
    depends_on:
      - web

networks:
  default:
    name: portfolio-net
